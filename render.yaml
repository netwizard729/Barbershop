# render.yaml — Deploy BarberBook to Render with one click
# 
# HOW TO USE:
#   1. Push this entire project to a GitHub repo
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your GitHub repo — Render will detect this file
#   4. Click "Apply" — Render creates all 3 services automatically
#
# After deploy:
#   - Copy your backend URL (e.g. https://barberbook-api.onrender.com)
#   - Set it as VITE_API_URL in your frontend service environment variables
#   - Copy your frontend URL and set it as FRONTEND_URL in your backend service

services:

  # ── Backend (Django API) ────────────────────────────────────────────────────
  - type: web
    name: barberbook-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn barbershop.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    healthCheckPath: /api/appointments/services/
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure key
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: barberbook-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false                  # Fill this in after frontend is deployed

  # ── Frontend (React static site) ───────────────────────────────────────────
  - type: web
    name: barberbook-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    headers:
      - path: "/*"
        name: Cache-Control
        value: "no-cache"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"   # SPA routing — all paths serve index.html
    envVars:
      - key: VITE_API_URL
        sync: false                  # Fill this in with your backend URL

# ── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: barberbook-db
    region: oregon
    plan: free
    databaseName: barbershop_db
    user: barbershop
