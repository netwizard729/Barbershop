services:

  # ── Backend (Django API) ──────────────────────────────────────────────────
  - type: web
    name: barberbook-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn barbershop.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    healthCheckPath: /api/appointments/services/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: barberbook-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

  # ── Frontend (React static site) ─────────────────────────────────────────
  - type: web
    name: barberbook-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    headers:
      - path: "/*"
        name: Cache-Control
        value: "no-cache"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_URL
        sync: false

# ── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: barberbook-db
    region: oregon
    plan: free
    databaseName: barbershop_db
    user: barbershop
