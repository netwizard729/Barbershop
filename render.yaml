# render.yaml — Deploy BarberBook to Render
#
# HOW TO USE:
#   1. Push this project to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your repo — Render detects this file automatically
#   4. Click "Apply" — all 3 services are created
#
# After first deploy, link frontend ↔ backend:
#   - Set VITE_API_URL in barberbook-frontend env  → your backend URL
#   - Set FRONTEND_URL in barberbook-api env        → your frontend URL

services:

  # ── Backend (Django API) ──────────────────────────────────────────────────
  - type: web
    name: barberbook-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn barbershop.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    healthCheckPath: /api/appointments/services/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: barberbook-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

  # ── Frontend (React static site) ─────────────────────────────────────────
  - type: static
    name: barberbook-frontend
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    headers:
      - path: "/*"
        name: Cache-Control
        value: "no-cache"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
